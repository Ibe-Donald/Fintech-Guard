services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: fintech-rabbit
    environment:
      - 'RABBITMQ_DEFAULT_PASS=secret'
      - 'RABBITMQ_DEFAULT_USER=myuser'
    ports:
      - "5672:5672"   # The "Mail Slot" (where messages go)
      - "15672:15672" # The "Dashboard" (where you can see the queues)